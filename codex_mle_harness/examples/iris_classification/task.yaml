task_id: iris_classification
task_name: Iris Classification Mini Benchmark
description_path: description.md
data_mounts:
  - source: data
    target: input
    read_only: true
required_outputs:
  - submission/predictions.csv
entrypoint: run.py
evaluator_command: python /task/evaluator.py
evaluator_result_path: evaluator_result.json
primary_metric_name: accuracy
higher_is_better: true
docker_image: python:3.12-slim
attempt_timeout_seconds: 300
evaluator_timeout_seconds: 120
resources:
  memory_limit: 1g
  cpu_limit: 1.0
  artifact_size_limit_mb: 64
stop_conditions:
  max_attempts: 2
  plateau_rounds: 1
scheduler:
  beam_width: 2
  round_size: 1
planner:
  type: static
