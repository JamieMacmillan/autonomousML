task_id: insults_mlebench
task_name: Detecting Insults In Social Commentary
description_path: description.md
data_mounts:
  - source: ../../assets/data/detecting-insults-in-social-commentary/prepared
    target: input
    read_only: true
required_outputs:
  - submission/submission.csv
entrypoint: run.py
evaluator_command: python /task/evaluator.py
evaluator_result_path: evaluator_result.json
primary_metric_name: accuracy
higher_is_better: true
docker_image: python:3.12-slim
dependency_policy:
  allow_requirements_txt: true
  requirements_path: requirements.txt
  install_command: python -m pip install --quiet --root-user-action ignore -r {requirements_path}
  install_timeout_seconds: 300
attempt_timeout_seconds: 600
evaluator_timeout_seconds: 420
resources:
  memory_limit: 2g
  cpu_limit: 1.0
  artifact_size_limit_mb: 128
stop_conditions:
  max_attempts: 3
  plateau_rounds: 2
scheduler:
  beam_width: 2
  round_size: 1
planner:
  type: ml_master
  api_key_env: CEREBRAS_API_KEY
  base_url: https://api.cerebras.ai/v1
  model: llama3.1-8b
  max_tokens: 2048
implementation_worker:
  type: codex
  mode: auto
  fallback_to_exec: true
