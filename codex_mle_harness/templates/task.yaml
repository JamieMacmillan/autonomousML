# Copy this directory for a new benchmark-style optimization task.
# Keep task-owned evaluator assets beside this file; they are mounted read-only at /task.
task_id: replace_with_short_task_id
task_name: Replace With Human-Readable Task Name
description_path: description.md

# Data can be tabular, image, video, time-series, logs, or any other file tree.
# Use read-only mounts for large or private data rather than copying it into attempts.
data_mounts:
  - source: data
    target: input
    read_only: true

# Candidate-visible starter files only. Paths below this task directory are copied
# into attempts with the same relative path. Large assets should be data_mounts.
support_files: []

required_outputs:
  - submission/predictions.csv

entrypoint: run.py
evaluator_command: python /task/evaluator.py
evaluator_result_path: evaluator_result.json
primary_metric_name: accuracy
higher_is_better: true

docker_image: python:3.12-slim
dependency_policy:
  allow_requirements_txt: true
  requirements_path: requirements.txt
  install_command: python -m pip install --quiet --root-user-action ignore -r {requirements_path}
  install_timeout_seconds: 300

attempt_timeout_seconds: 1800
evaluator_timeout_seconds: 600
resources:
  memory_limit: 4g
  cpu_limit: 2.0
  gpu_devices: null
  artifact_size_limit_mb: 256

stop_conditions:
  max_attempts: 5
  max_wall_clock_seconds: 14400
  target_metric_value: null
  plateau_rounds: 2

scheduler:
  beam_width: 2
  round_size: 1
  fresh_draft_fraction: 0.25
  novelty_fraction: 0.25
  failure_retry_fraction: 0.10

# Use static for offline smoke tests. Use ml_master or openai_compatible for
# real planning once provider credentials are configured.
planner:
  type: static

implementation_worker:
  type: codex
  mode: auto
  fallback_to_exec: true
